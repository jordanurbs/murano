<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Murano{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  {% if api_token %}
  <!-- If --api-token / MURANO_API_TOKEN was set at startup, the UI's JS
       reads this meta tag and includes the value as X-Murano-Token on every
       fetch to /api/. Same-Origin Policy protects this against cross-origin
       readers; a malicious page in your browser can't pull the token out of
       Murano's HTML. -->
  <meta name="murano-api-token" content="{{ api_token }}">
  {% endif %}
  <!-- htmx is vendored under /static/htmx.min.js so the local UI never
       fetches third-party scripts. Original: htmx.org @ 2.0.4 (BSD-2). -->
  <script src="/static/htmx.min.js" defer></script>
  {% block head_extra %}{% endblock %}
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo-dot"></span>
      <a href="/" class="brand-name">Murano</a>
      <span class="tag">local-first knowledge base</span>
    </div>
    <nav class="nav">
      <a href="/" class="{% if page == 'chat' %}active{% endif %}">Chat</a>
      <a href="/browse" class="{% if page == 'browse' %}active{% endif %}">Browse</a>
      <a href="/settings" class="{% if page == 'settings' %}active{% endif %}">Settings</a>
      <a href="/docs" target="_blank" rel="noopener">API</a>
      <button id="theme-toggle" class="theme-toggle" title="Toggle theme" type="button">
        <span class="moon">&#9789;</span><span class="sun">&#9728;</span>
      </button>
    </nav>
  </header>

  <main class="main">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <span>vault: <code>{{ settings.vault_root }}</code></span>
    <span>chat: <code>{{ settings.chat_model }}</code></span>
    <span>embed: <code>{{ settings.embed_model }}</code></span>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
